name: BTC Daily Model Refresh + Hourly Predictions

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tournament:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"
      DAGSHUB_OWNER: ${{ secrets.DAGSHUB_OWNER }}
      DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      MLFLOW_MODEL_NAME: ${{ secrets.MLFLOW_MODEL_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate required secrets
        run: |
          test -n "$MLFLOW_TRACKING_URI"
          test -n "$MLFLOW_TRACKING_USERNAME"
          test -n "$MLFLOW_TRACKING_PASSWORD"

      - name: Validate previous prediction and refresh daily dashboard
        run: python validate_dashboard_daily.py

      - name: Decide whether to run this hour
        id: hourly_gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run_tournament=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          expected_target=$(python -c "from datetime import datetime, timezone, timedelta; now=datetime.now(timezone.utc); target=now.replace(minute=0, second=0, microsecond=0)+timedelta(hours=1); print(target.isoformat())")
          saved_target=$(python -c "import json; from pathlib import Path; path=Path('last_prediction_daily.json'); data=json.loads(path.read_text(encoding='utf-8')) if path.exists() else {}; print(data.get('target_candle_timestamp',''))")
          saved_status=$(python -c "import json; from pathlib import Path; path=Path('last_prediction_daily.json'); data=json.loads(path.read_text(encoding='utf-8')) if path.exists() else {}; print(data.get('status',''))")

          echo "expected_target=$expected_target"
          echo "saved_target=$saved_target"
          echo "saved_status=$saved_status"

          if [ -n "$saved_target" ] && [ "$saved_target" = "$expected_target" ] && [ "$saved_status" = "success" ]; then
            echo "run_tournament=false" >> "$GITHUB_OUTPUT"
            echo "Scheduled run already exists for this target candle. Skipping prediction pipeline."
          else
            echo "run_tournament=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit daily dashboard artifacts
        if: always() && steps.hourly_gate.outputs.run_tournament != 'true'
        run: |
          if [ -f history_daily.csv ] || [ -f assets/dailydashboard.png ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            [ -f history_daily.csv ] && git add history_daily.csv
            [ -f assets/dailydashboard.png ] && git add assets/dailydashboard.png
            if [ -n "$(git status --porcelain)" ]; then
              git commit -m "Update BTC daily validation dashboard [skip ci]"
              git pull --rebase origin main
              git push origin HEAD:main
            fi
          fi

      - name: Run daily refresh or hourly prediction
        id: tournament
        continue-on-error: true
        if: steps.hourly_gate.outputs.run_tournament == 'true'
        run: python daily_main.py

      - name: Refresh daily dashboard with latest next prediction
        if: always() && steps.hourly_gate.outputs.run_tournament == 'true'
        run: python validate_dashboard_daily.py

      - name: Commit daily prediction metadata
        if: always()
        run: |
          if [ -f last_prediction_daily.json ] || [ -f history_daily.csv ] || [ -f assets/dailydashboard.png ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            [ -f last_prediction_daily.json ] && git add last_prediction_daily.json
            [ -f history_daily.csv ] && git add history_daily.csv
            [ -f assets/dailydashboard.png ] && git add assets/dailydashboard.png
            if [ -n "$(git status --porcelain)" ]; then
              git commit -m "Update BTC daily bot artifacts [skip ci]"
              git pull --rebase origin main
              git push origin HEAD:main
            fi
          fi

      - name: Fail job if prediction pipeline failed
        if: steps.hourly_gate.outputs.run_tournament == 'true' && steps.tournament.outcome == 'failure'
        run: exit 1
