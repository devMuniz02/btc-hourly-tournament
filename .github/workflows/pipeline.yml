name: BTC Directional Tournament

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tournament:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"
      DAGSHUB_OWNER: ${{ secrets.DAGSHUB_OWNER }}
      DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      MLFLOW_MODEL_NAME: ${{ secrets.MLFLOW_MODEL_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate required secrets
        run: |
          test -n "$MLFLOW_TRACKING_URI"
          test -n "$MLFLOW_TRACKING_USERNAME"
          test -n "$MLFLOW_TRACKING_PASSWORD"

      - name: Validate previous prediction and refresh dashboard
        run: python validate_dashboard.py

      - name: Commit dashboard artifacts
        run: |
          if [ -n "$(git status --porcelain -- history.csv assets/dashboard.png)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add history.csv assets/dashboard.png
            git commit -m "Update BTC validation dashboard [skip ci]"
            git push origin HEAD:main
          fi

      - name: Run directional tournament
        run: python main.py

      - name: Commit latest prediction metadata
        run: |
          if [ -n "$(git status --porcelain -- last_prediction.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add last_prediction.json
            git commit -m "Update last BTC prediction metadata [skip ci]"
            git push origin HEAD:main
          fi
