name: BTC Directional Tournament

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tournament:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"
      DAGSHUB_OWNER: ${{ secrets.DAGSHUB_OWNER }}
      DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      MLFLOW_MODEL_NAME: ${{ secrets.MLFLOW_MODEL_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate required secrets
        run: |
          test -n "$MLFLOW_TRACKING_URI"
          test -n "$MLFLOW_TRACKING_USERNAME"
          test -n "$MLFLOW_TRACKING_PASSWORD"

      - name: Validate previous prediction and refresh dashboard
        run: python src/btc_pipeline/validate_dashboard.py

      - name: Decide whether to run this hour
        id: hourly_gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run_tournament=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          expected_target=$(python -c "from datetime import datetime, timezone, timedelta; now=datetime.now(timezone.utc); target=now.replace(minute=0, second=0, microsecond=0)+timedelta(hours=1); print(target.isoformat())")
          saved_target=$(python -c "import json; from pathlib import Path; path=Path('artifacts/btc/hourly/last_prediction.json'); data=json.loads(path.read_text(encoding='utf-8')) if path.exists() else {}; print(data.get('target_candle_timestamp',''))")
          saved_status=$(python -c "import json; from pathlib import Path; path=Path('artifacts/btc/hourly/last_prediction.json'); data=json.loads(path.read_text(encoding='utf-8')) if path.exists() else {}; print(data.get('status',''))")

          echo "expected_target=$expected_target"
          echo "saved_target=$saved_target"
          echo "saved_status=$saved_status"

          if [ -n "$saved_target" ] && [ "$saved_target" = "$expected_target" ] && [ "$saved_status" = "success" ]; then
            echo "run_tournament=false" >> "$GITHUB_OUTPUT"
            echo "Scheduled run already exists for this target candle. Skipping tournament."
          else
            echo "run_tournament=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit dashboard artifacts
        if: always() && steps.hourly_gate.outputs.run_tournament != 'true'
        run: |
          if [ -f artifacts/btc/hourly/history.csv ] || [ -f assets/btc/hourly/dashboard.png ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            tmpdir=$(mktemp -d)
            tracked_files=(
              artifacts/btc/hourly/history.csv
              assets/btc/hourly/dashboard.png
              assets/btc/hourly/dashboard_reverse.png
              assets/btc/hourly/dashboard_market_hours.png
              assets/btc/hourly/dashboard_market_hours_reverse.png
            )
            for file in "${tracked_files[@]}"; do
              if [ -f "$file" ]; then
                mkdir -p "$tmpdir/$(dirname "$file")"
                cp "$file" "$tmpdir/$file"
              fi
            done
            success=false
            for attempt in 1 2 3 4 5; do
              echo "Artifact push attempt $attempt (reset-and-reapply)"
              git fetch origin main
              git reset --hard origin/main
              for file in "${tracked_files[@]}"; do
                if [ -f "$tmpdir/$file" ]; then
                  mkdir -p "$(dirname "$file")"
                  cp "$tmpdir/$file" "$file"
                fi
              done
              git add -- "${tracked_files[@]}"
              if [ -z "$(git status --porcelain)" ]; then
                success=true
                break
              fi
              git commit -m "BTC dash [skip ci]"
              if git push origin HEAD:main; then
                success=true
                break
              fi
              sleep 2
            done
            rm -rf "$tmpdir"
            if [ "$success" != "true" ]; then
              echo "Failed to push dashboard artifacts after 5 attempts."
              exit 1
            fi
          fi

      - name: Run directional tournament
        id: tournament
        continue-on-error: true
        if: steps.hourly_gate.outputs.run_tournament == 'true'
        run: python src/btc_pipeline/main.py

      - name: Refresh dashboard with latest next prediction
        if: always() && steps.hourly_gate.outputs.run_tournament == 'true'
        run: python src/btc_pipeline/validate_dashboard.py

      - name: Commit latest prediction metadata
        if: always()
        run: |
          if [ -f artifacts/btc/hourly/last_prediction.json ] || [ -f artifacts/btc/hourly/history.csv ] || [ -f assets/btc/hourly/dashboard.png ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            tmpdir=$(mktemp -d)
            tracked_files=(
              artifacts/btc/hourly/last_prediction.json
              artifacts/btc/hourly/history.csv
              assets/btc/hourly/dashboard.png
              assets/btc/hourly/dashboard_reverse.png
              assets/btc/hourly/dashboard_market_hours.png
              assets/btc/hourly/dashboard_market_hours_reverse.png
            )
            for file in "${tracked_files[@]}"; do
              if [ -f "$file" ]; then
                mkdir -p "$tmpdir/$(dirname "$file")"
                cp "$file" "$tmpdir/$file"
              fi
            done
            success=false
            for attempt in 1 2 3 4 5; do
              echo "Artifact push attempt $attempt (reset-and-reapply)"
              git fetch origin main
              git reset --hard origin/main
              for file in "${tracked_files[@]}"; do
                if [ -f "$tmpdir/$file" ]; then
                  mkdir -p "$(dirname "$file")"
                  cp "$tmpdir/$file" "$file"
                fi
              done
              git add -- "${tracked_files[@]}"
              if [ -z "$(git status --porcelain)" ]; then
                success=true
                break
              fi
              git commit -m "BTC artifacts [skip ci]"
              if git push origin HEAD:main; then
                success=true
                break
              fi
              sleep 2
            done
            rm -rf "$tmpdir"
            if [ "$success" != "true" ]; then
              echo "Failed to push prediction artifacts after 5 attempts."
              exit 1
            fi
          fi

      - name: Fail job if tournament failed
        if: steps.hourly_gate.outputs.run_tournament == 'true' && steps.tournament.outcome == 'failure'
        run: exit 1
